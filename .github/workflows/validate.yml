name: validate
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: frontmatter present in every SKILL.md
        run: |
          fail=0
          while IFS= read -r f; do
            grep -q '^name:' "$f" && grep -q '^description:' "$f" || { echo "missing frontmatter: $f"; fail=1; }
          done < <(find . -name SKILL.md -not -path './.git/*')
          exit $fail
